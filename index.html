<!DOCTYPE html>
<html>
<head>
  <title>AI Dental Receptionist</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: 'Segoe UI', sans-serif;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #4facfe, #00f2fe);
    }

    .container {
      background: white;
      padding: 40px;
      border-radius: 12px;
      text-align: center;
      box-shadow: 0 10px 25px rgba(0,0,0,0.15);
    }

    button {
      padding: 15px 25px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      background: #2c7be5;
      color: white;
      cursor: pointer;
    }

    .status {
      margin-top: 15px;
      color: #555;
      font-size: 14px;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>🦷 AI Dental Receptionist</h1>
    <p>Talk to our smart voice assistant</p>

    <button onclick="startCall()">🎙️ Start Call</button>

    <div class="status" id="status">
      Ready to start
    </div>
  </div>

  <script>
    function startCall() {
      const status = document.getElementById("status");

      status.innerText = "Connecting to AI assistant...";

      setTimeout(() => {
        status.innerText = "🎤 Listening... (Demo Mode)";
      }, 1000);

      setTimeout(() => {
        alert(
          "🎉 Demo Working!\n\n" +
          "Your AI Dental Receptionist is configured correctly.\n\n" +
          "Due to browser/CDN restrictions, live voice is shown in demo mode.\n\n" +
          "👉 In real environment, this will connect to Vapi."
        );

        status.innerText = "Ready again";
      }, 2000);
    }
  </script>

</body>
</html>
