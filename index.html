<!DOCTYPE html>
<html>
<head>
  <title>AI Dental Receptionist</title>
  
  <script src="https://cdn.jsdelivr.net/npm/@vapi-ai/web/dist/index.umd.js"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: 'Segoe UI', sans-serif;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #4facfe, #00f2fe);
    }

    .container {
      background: white;
      padding: 40px;
      border-radius: 12px;
      text-align: center;
    }

    button {
      padding: 15px 25px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      background: #2c7be5;
      color: white;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <div class="container">
    <h2>🦷 AI Dental Receptionist</h2>
    <button onclick="startCall()">Start Call</button>
  </div>

  <script>
    let vapi;

    window.onload = function () {
      console.log("Page loaded");

      // VERY IMPORTANT 👇
      vapi = new window.Vapi("YOUR_PUBLIC_API_KEY");
    };

    function startCall() {
      if (!vapi) {
        alert("Vapi not loaded yet. Refresh page.");
        return;
      }

      console.log("Starting call...");
      vapi.start("YOUR_ASSISTANT_ID");
    }
  </script>

</body>
</html>
