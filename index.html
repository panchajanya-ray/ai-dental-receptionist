<!DOCTYPE html>
<html>
<head>
  <title>AI Dental Receptionist</title>


  <script src="https://cdn.jsdelivr.net/npm/@vapi-ai/web/dist/index.umd.js"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: 'Segoe UI', sans-serif;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #4facfe, #00f2fe);
    }

    .container {
      background: white;
      padding: 40px;
      border-radius: 12px;
      text-align: center;
      box-shadow: 0 10px 25px rgba(0,0,0,0.15);
    }

    button {
      padding: 15px 25px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      background: #2c7be5;
      color: white;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>🦷 AI Dental Receptionist</h1>
    <p>Talk to our smart voice assistant</p>

    <button onclick="startCall()">🎙️ Start Call</button>
  </div>

  <script>
    let vapi;

    
    window.onload = function () {
      console.log("Page loaded");

      if (!window.Vapi) {
        alert("Vapi SDK failed to load");
        return;
      }

      vapi = new window.Vapi("7a440449-d102-40d4-881f-6b72ec6ca0b0");
    };

    function startCall() {
      if (!vapi) {
        alert("Vapi not ready. Refresh page.");
        return;
      }

      console.log("Starting call...");
      vapi.start("bbc305bb-9fc6-4c05-9f78-b30b671a655f");
    }
  </script>

</body>
</html>
