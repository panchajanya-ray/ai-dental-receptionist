<!DOCTYPE html>
<html>
<head>
  <title>AI Dental Receptionist</title>


 

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: 'Segoe UI', sans-serif;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #4facfe, #00f2fe);
    }

    .container {
      background: white;
      padding: 40px;
      border-radius: 12px;
      text-align: center;
      box-shadow: 0 10px 25px rgba(0,0,0,0.15);
    }

    button {
      padding: 15px 25px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      background: #2c7be5;
      color: white;
      cursor: pointer;
    }
  </style>
</head>
<script>
  const script = document.createElement("script");
  script.src = "https://unpkg.com/@vapi-ai/web/dist/index.umd.js";
  script.onload = () => {
    console.log("Vapi loaded successfully");

    const vapi = new window.Vapi("7a440449-d102-40d4-881f-6b72ec6ca0b0");

    window.startCall = function () {
      console.log("Starting call...");
      vapi.start("bbc305bb-9fc6-4c05-9f78-b30b671a655f");
    };
  };

  script.onerror = () => {
    alert("Failed to load Vapi SDK. Check internet or try again.");
  };

  document.body.appendChild(script);
</script>
  
<body>

  <div class="container">
    <h1>🦷 AI Dental Receptionist</h1>
    <p>Talk to our smart voice assistant</p>

    <button onclick="startCall()">🎙️ Start Call</button>
  </div>

</body>
</html>
